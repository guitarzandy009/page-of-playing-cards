<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Playing Cards</title>
    <link href="styles.css" rel="stylesheet" />
  </head>

  <body>
    <main id="playing-cards">
      <!-- Ace of Swords -->
      <div class="card spade">
        <div class="left">
          <div>A</div>
          <div>♠</div>
        </div>
        <div class="middle">♠</div>
        <div class="right">
          <div>♠</div>
          <div>A</div>
        </div>
      </div>
      <!-- King of Wands  -->
      <div class="card club">
        <div class="left">
          <div>K</div>
          <div>♣</div>
        </div>
        <div class="middle">♣</div>
        <div class="right">
          <div>♣</div>
          <div>K</div>
        </div>
      </div>
      <!-- Queen of Cups -->
      <div class="card heart">
        <div class="left">
          <div>Q</div>
          <div>♥</div>
        </div>
        <div class="middle">♥</div>
        <div class="right">
          <div>♥</div>
          <div>Q</div>
        </div>
      </div>
      <!-- Jack of Pentacles -->
      <div class="card diamond">
        <div class="left">
          <div>J</div>
          <div>♦</div>
        </div>
        <div class="middle">♦</div>
        <div class="right">
          <div>♦</div>
          <div>J</div>
        </div>
      </div>
    </main>
  </body>
</html>
